<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dashboard | id.cv</title>
    <meta name="description" content="Manage your verified .cv domains, DNS records, and agent subdomains." />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Figtree:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="page">
      <header class="dash-header">
        <a class="logo" href="/">
          <img src="idcvblacklogo.png" alt="id.cv" class="logo-img logo-light" />
          <img src="idcvwhitelogo.png" alt="id.cv" class="logo-img logo-dark" />
        </a>
        <div class="dash-user">
          <div class="avatar" id="dash-avatar">JD</div>
          <span id="dash-user-name">John Doe</span>
          <button class="text-btn" id="logout-btn">Log out</button>
        </div>
      </header>

      <div class="dash-body">
        <div class="view-header">
          <div>
            <h1 class="view-title">Your domains</h1>
            <p class="view-subtitle">Manage your verified .cv domains and agent subdomains.</p>
          </div>
          <a href="verify.html" class="btn-primary small">+ Add domain</a>
        </div>

        <div class="domain-grid" id="domain-grid">
          <!-- Populated by JS -->
        </div>
      </div>

      <footer class="footer dash-footer">
        <img src="idcvblacklogo.png" alt="id.cv" class="footer-logo logo-light" />
        <img src="idcvwhitelogo.png" alt="id.cv" class="footer-logo logo-dark" />
        <span>id.cv &mdash; Open protocol for agent reputation and human identity</span>
      </footer>
    </div>
    <script src="shared.js"></script>
    <script src="dashboard-grid.js"></script>
  </body>
</html>
